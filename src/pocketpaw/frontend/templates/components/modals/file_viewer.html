<!--
  PocketPaw Dashboard - File Viewer Modal

  Created: 2026-03-03
  Displays PDF, images, text/code, and unknown files in an in-app viewer.
-->
<!-- File Viewer Modal -->
<div
class="fixed inset-0 z-[110] flex items-center justify-center bg-black/40 backdrop-blur-md p-4"
x-show="showFileViewer"
x-transition.opacity
@click.self="closeFileViewer()"
@keydown.escape.window="closeFileViewer()"
>
<div class="w-full max-w-[900px] max-h-[90vh] flex flex-col bg-[#1c1c1e]/95 backdrop-blur-xl border border-[var(--glass-border)] rounded-[20px] shadow-2xl animate-[modalPop_0.25s_ease-out] overflow-hidden" @click.stop>

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-[var(--glass-border)] shrink-0">
        <div class="flex items-center gap-3 min-w-0">
            <i data-lucide="file-text" class="w-5 h-5 text-[var(--accent-color)] shrink-0"></i>
            <h2 class="text-[17px] font-semibold truncate" x-text="viewerFileName"></h2>
            <span class="text-xs text-[var(--text-secondary)] px-2 py-0.5 bg-white/5 rounded-full shrink-0 uppercase" x-text="viewerFileType"></span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <!-- Diff toggle (only in edit mode) -->
            <button
                x-show="viewerEditMode"
                @click="toggleDiffView()"
                class="p-2 text-[var(--text-secondary)] hover:text-white hover:bg-white/10 rounded-lg transition-colors text-xs font-medium px-3"
                :class="viewerShowDiff ? 'bg-white/10 text-white' : ''"
                title="Toggle diff view"
            >
                Diff
            </button>
            <!-- Save (only in edit mode) -->
            <button
                x-show="viewerEditMode"
                @click="saveFileEdits()"
                class="p-2 bg-[var(--accent-color)] hover:bg-[var(--accent-hover)] text-white rounded-lg transition-colors text-xs font-medium px-3"
                title="Save changes"
            >
                Save
            </button>
            <!-- Edit / Cancel toggle (text and markdown only) -->
            <button
                x-show="viewerFileType === 'text' || viewerFileType === 'markdown'"
                @click="toggleEditMode()"
                class="p-2 text-[var(--text-secondary)] hover:text-white hover:bg-white/10 rounded-lg transition-colors"
                :title="viewerEditMode ? 'Cancel editing' : 'Edit file'"
            >
                <i :data-lucide="viewerEditMode ? 'x-circle' : 'pencil'" class="w-4 h-4"></i>
            </button>
            <a
                :href="viewerContentUrl"
                download
                class="p-2 text-[var(--text-secondary)] hover:text-white hover:bg-white/10 rounded-lg transition-colors"
                title="Download"
            >
                <i data-lucide="download" class="w-4 h-4"></i>
            </a>
            <!-- Add to chat -->
            <button
                x-show="!viewerEditMode"
                @click="addFileToChat()"
                class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-[var(--accent-color)] hover:text-white bg-[var(--accent-color)]/10 hover:bg-[var(--accent-color)] rounded-lg transition-colors"
                title="Add file reference to chat input"
            >
                <i data-lucide="message-square-plus" class="w-3.5 h-3.5"></i>
                Add to chat
            </button>
            <button class="p-2 text-[var(--text-secondary)] hover:text-white hover:bg-white/10 rounded-lg transition-colors" @click="closeFileViewer()">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-hidden relative">

        <!-- Loading -->
        <template x-if="viewerLoading">
            <div class="flex items-center justify-center h-64">
                <div class="animate-spin w-8 h-8 border-2 border-[var(--accent-color)] border-t-transparent rounded-full"></div>
            </div>
        </template>

        <!-- PDF viewer -->
        <template x-if="!viewerLoading && viewerFileType === 'pdf'">
            <iframe
                :src="viewerContentUrl"
                class="w-full h-full min-h-[70vh] border-0"
                title="PDF Viewer"
            ></iframe>
        </template>

        <!-- Image viewer -->
        <template x-if="!viewerLoading && viewerFileType === 'image'">
            <div class="p-6 overflow-auto flex items-center justify-center" style="max-height: calc(90vh - 70px);">
                <img
                    :src="viewerContentUrl"
                    :alt="viewerFileName"
                    class="max-w-full max-h-[75vh] object-contain rounded-lg border border-[var(--glass-border)]"
                />
            </div>
        </template>

        <!-- Text / Code viewer (syntax-highlighted when hljs available) -->
        <template x-if="!viewerLoading && viewerFileType === 'text' && !viewerEditMode">
            <div class="overflow-auto" style="max-height: calc(90vh - 70px);">
                <!-- Syntax highlighted -->
                <template x-if="viewerHighlightedHtml">
                    <pre class="hljs p-6 text-sm leading-relaxed font-mono" style="background:transparent;border-radius:0;margin:0"><code x-html="viewerHighlightedHtml"></code></pre>
                </template>
                <!-- Plain text fallback -->
                <template x-if="!viewerHighlightedHtml">
                    <pre class="p-6 text-sm leading-relaxed font-mono text-[var(--text-primary)] whitespace-pre-wrap break-words" x-text="viewerTextContent"></pre>
                </template>
            </div>
        </template>

        <!-- Markdown viewer -->
        <template x-if="!viewerLoading && viewerFileType === 'markdown' && !viewerEditMode">
            <div class="overflow-auto prose prose-invert prose-sm max-w-none px-8 py-6" style="max-height: calc(90vh - 70px);" x-html="viewerMarkdownHtml"></div>
        </template>

        <!-- Inline editor (text + markdown when edit mode active) -->
        <template x-if="!viewerLoading && viewerEditMode && !viewerShowDiff && (viewerFileType === 'text' || viewerFileType === 'markdown')">
            <div class="flex flex-col flex-1 overflow-hidden" style="max-height: calc(90vh - 70px);">
                <textarea
                    x-model="viewerEditContent"
                    class="flex-1 w-full h-full resize-none p-6 text-sm font-mono bg-[#1a1a1c] text-[var(--text-primary)] focus:outline-none border-0"
                    spellcheck="false"
                    style="min-height: 400px;"
                ></textarea>
            </div>
        </template>

        <!-- Diff view -->
        <template x-if="!viewerLoading && viewerEditMode && viewerShowDiff">
            <div class="overflow-auto font-mono text-xs" style="max-height: calc(90vh - 70px);">
                <template x-for="(row, idx) in _computeDiff(viewerOriginalContent, viewerEditContent)" :key="idx">
                    <div
                        class="flex gap-0 leading-6 px-4"
                        :class="{
                            'bg-[var(--success-color)]/10 text-[var(--success-color)]': row.type === 'added',
                            'bg-[var(--danger-color)]/10 text-[var(--danger-color)] line-through': row.type === 'removed',
                            'text-white/50': row.type === 'same'
                        }"
                    >
                        <span class="w-8 shrink-0 select-none opacity-40" x-text="row.num"></span>
                        <span class="w-5 shrink-0 select-none"
                            x-text="row.type === 'added' ? '+' : (row.type === 'removed' ? '-' : ' ')"
                        ></span>
                        <span class="whitespace-pre-wrap break-all" x-text="row.line"></span>
                    </div>
                </template>
            </div>
        </template>

        <!-- Error -->
        <template x-if="!viewerLoading && viewerFileType === 'error'">
            <div class="p-6 text-center">
                <i data-lucide="alert-circle" class="w-12 h-12 mx-auto mb-4 text-[var(--danger-color)]"></i>
                <p class="text-[var(--text-secondary)]" x-text="viewerTextContent"></p>
            </div>
        </template>

        <!-- Unknown / unsupported -->
        <template x-if="!viewerLoading && viewerFileType === 'unknown'">
            <div class="p-6 text-center">
                <i data-lucide="file-question" class="w-12 h-12 mx-auto mb-4 text-[var(--text-secondary)]"></i>
                <p class="text-[var(--text-secondary)] mb-4">This file type cannot be previewed in the browser.</p>
                <a
                    :href="viewerContentUrl"
                    download
                    class="inline-flex items-center gap-2 px-4 py-2 bg-[var(--accent-color)] text-white rounded-lg hover:opacity-90 transition-opacity"
                >
                    <i data-lucide="download" class="w-4 h-4"></i>
                    Download File
                </a>
            </div>
        </template>

    </div>
</div>
</div>
